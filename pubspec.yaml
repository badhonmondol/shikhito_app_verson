name: shikhito_app
description: "শিখিতো - পড়ে শোনানো ও কথা বলে লেখার অ্যাপ"
publish_to: 'none'

version: 1.1.3+113

environment:
  sdk: ">=3.5.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0

  device_info_plus: ^13.1.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.0+1
  geolocator: ^11.0.0

  # ── Update system ──
  http: ^1.2.0
  open_filex: ^4.3.4
  package_info_plus: ^10.1.0
  path_provider: ^2.1.2

  # ── Local storage ──
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/shikhito.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/shikhito.jpeg"
